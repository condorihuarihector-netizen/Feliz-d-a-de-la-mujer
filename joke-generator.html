<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }
        #joke {
            font-size: 1.5em;
            margin: 20px 0;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <div id="joke">Press the button to get a joke!</div>
    <button id="jokeBtn">Get Joke</button>

    <script>
        document.getElementById('jokeBtn').addEventListener('click', async () => {
            const response = await fetch('https://api.jokes.one/jod');
            const data = await response.json();
            document.getElementById('joke').innerText = data.contents.jokes[0].joke.text;
        });
    </script>
</body>
</html>
